<header class="fixed top-0 left-0 z-50 w-full bg-[#111] border-b border-white/10 shadow-md">
  <div class="flex items-center justify-between h-12 px-4 sm:px-8 max-w-[80em] mx-auto">
    <!-- Logo -->
    <a href="{{ "" | relLangURL }}" class="flex items-center gap-2">
      <img src="{{ "images/avatar.png" | relURL }}" alt="{{ site.Title }}" class="h-8 w-8 rounded-full">
    </a>

    <!-- Nav -->
    <nav>
      <ul class="flex items-center gap-4 sm:gap-8 text-sm tracking-wide">
        <li><a href="#get-started" class="text-white hover:text-[#B780FF] transition-colors">{{ i18n "nav_download" }}</a></li>
        <li><a href="#learn-more" class="text-white hover:text-[#B780FF] transition-colors">{{ i18n "nav_learn" }}</a></li>
        <li><a href="#tips--tricks" class="text-white hover:text-[#B780FF] transition-colors">{{ i18n "nav_tips" }}</a></li>
        <li><a href="#faq" class="text-white hover:text-[#B780FF] transition-colors">{{ i18n "nav_faq" }}</a></li>

        <!-- Language Switcher -->
        {{ if hugo.IsMultilingual }}
        <li class="relative group">
          <button class="text-white hover:text-[#B780FF] transition-colors cursor-pointer" aria-label="{{ i18n "language_switcher" }}">
            {{ upper .Lang }}
          </button>
          <ul class="absolute right-0 top-full mt-1 bg-[#111] border border-white/10 rounded shadow-lg hidden group-hover:block min-w-[8em] py-1">
            {{ range site.Languages }}
            <li>
              <a href="{{ "" | relLangURL }}{{ if ne .Lang site.Language.Lang }}{{ .Lang }}/{{ end }}"
                 class="block px-4 py-1 text-sm text-[#f8f8f8] hover:text-[#B780FF] hover:bg-white/5 transition-colors">
                {{ .LanguageName }}
              </a>
            </li>
            {{ end }}
          </ul>
        </li>
        {{ end }}

        <!-- GitHub -->
        <li>
          <a href="https://github.com/nostr-resources/nostr-resources-v2" title="GitHub" class="text-white hover:text-[#B780FF] transition-colors">
            <svg class="w-4 h-4 inline-block" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
          </a>
        </li>
      </ul>
    </nav>
  </div>
</header>
